[PATHS]
; 双周报 Word 模板路径（.docx）
TEMPLATE_PATH = D:\python_source\需求导入\双周报需求模板.docx

; 一个或多个 Excel 台账路径：支持换行、英文逗号、分号分隔；可写多条
INPUT_PATHS = D:\python_source\需求导入\需求台账模板（20260321）.xlsx

; Title_Map：JSON 对象。键为 Excel 列名，值为 Word 表头列名（字符串），
; 或字符串数组（多列先后映射到同一 Word 列时，仅非空覆盖，见程序注释 [WR-011]）。
; 以下映射按业务约定：「问题」列由程序统一写「暂无」，不必在此配置。
;Title_Map = {"工单概要":"需求事项","工单详情描述":"协调情况","回复人":"序号","回复时间/ITM回函时间":"受理时间","关联项目组":"","上线时间":""}
Title_Map = {"工单概要":"需求事项","回复人":"序号","回复时间/ITM回函时间":"受理时间","关联项目组":"关联项目组","上线时间":"上线时间"}


;注意:Title_Map 的映射顺序和 Compose_Map的顺序刚好相反，Compose_Map 的顺序是 Word的表头在前
;Compose_Map = {"该需求【"+"工单编号/ITM编号"+"】\n" + "工单详情描述":"协调情况"}
;Compose_Map = {"协调情况": "\"该需求【\"+ITM编号+\"】\n\"+分行实施意见"}
Compose_Map = {"协调情况": "\"该需求【\"+ITM编号+\"】\n\"+分行实施意见"}

; 仅处理合并后的前 N 行，用于试跑；0 表示不限制
